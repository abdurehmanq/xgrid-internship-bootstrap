services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins_local
   
    ports:
      - "8080:8080"
    volumes:
      - ./jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "108"  # Matches the GID of my host's docker group
    restart: unless-stopped
